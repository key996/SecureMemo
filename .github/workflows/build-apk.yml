name: Build Release APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Build APK
        run: |
          chmod +x ./gradlew
          ./gradlew assembleRelease -p app

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: SecureMemo-APK
          path: app/build/outputs/apk/release/*.apk
          retention-days: 7
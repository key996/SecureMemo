name: Build Release APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission
        run: chmod +x ./gradlew

      - name: Build APK
        run: ./gradlew assembleRelease --no-daemon

      - name: Check Build Output
        if: always()
        run: |
          echo "=== CHECKING BUILD OUTPUT ==="
          find . -name "*.apk" -type f 2>/dev/null | head -20
          echo ""
          echo "=== APP BUILD OUTPUTS ==="
          ls -la app/build/outputs/ 2>/dev/null || echo "app/build/outputs not found"
          echo ""
          echo "=== APK RELEASE ==="
          ls -la app/build/outputs/apk/release/ 2>/dev/null || echo "app/build/outputs/apk/release not found"
          echo ""
          echo "=== ALL APK FILES ==="
          find app -name "*.apk" -type f 2>/dev/null

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: SecureMemo-APK
          path: app/build/outputs/apk/release/
          retention-days: 7
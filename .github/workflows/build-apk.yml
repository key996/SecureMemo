name: Build Release APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/gradle-build-action@v2
        with:
          gradle-version: 7.5

      - name: Run Gradle
        id: gradle
        run: |
          echo "=== DIAGNOSTIC INFO ==="
          which gradle || echo "gradle not in PATH"
          echo "JAVA_HOME="
          echo "PATH="
          echo "=== TRYING BUILD ==="
          cd app
          gradle tasks --no-daemon 2>&1 || true
          echo "=== BUILD OUTPUT ==="
          gradle assembleRelease --no-daemon --stacktrace 2>&1 || true

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: SecureMemo-APK
          path: app/build/outputs/apk/release/*.apk
          retention-days: 7

      - name: Print output
        run: |
          echo "Gradle exit: " + ${{ steps.gradle.outputs.exit-code }}
          cat app/build/outputs/apk/release/*.apk 2>/dev/null || echo "APK not found"
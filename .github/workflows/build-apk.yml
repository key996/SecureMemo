name: Build Release APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission
        run: chmod +x ./gradlew

      - name: Diagnostic Info
        run: |
          echo "=== GRADLE VERSION ==="
          ./gradlew --version
          echo "=== JAVA VERSION ==="
          java -version
          echo "=== PROJECT STRUCTURE ==="
          ls -la
          echo "=== APP BUILD.GRADLE ==="
          head -20 app/build.gradle

      - name: Build APK
        run: ./gradlew assembleRelease --no-daemon --stacktrace 2>&1 | tee build.log

      - name: Show Build Log
        if: always()
        run: |
          echo "=== BUILD LOG (LAST 200 LINES) ==="
          tail -200 build.log

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: SecureMemo-APK
          path: app/build/outputs/apk/release/*.apk
          retention-days: 7
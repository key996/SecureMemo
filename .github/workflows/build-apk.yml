name: Build Release APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/gradle-build-action@v2
        with:
          gradle-version: 7.5

      - name: Show Gradle location
        run: |
          echo "Gradle home: ${{ env.GRADLE_HOME }}"
          echo "Gradle user home: ${{ env.GRADLE_USER_HOME }}"
          ls -la /home/runner/.gradle/wrapper/dists/gradle-7.5-bin/ 2>/dev/null || echo "Not found in home"
          find /opt -name "gradle" -type f 2>/dev/null || echo "Not found in /opt"
          which gradle 2>/dev/null || echo "gradle not in PATH"
          export PATH="${{ env.GRADLE_HOME }}/bin:$PATH" && gradle --version

      - name: Build APK
        run: |
          export PATH="${{ env.GRADLE_HOME }}/bin:$PATH"
          gradle assembleRelease --no-daemon -p app

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: SecureMemo-APK
          path: app/build/outputs/apk/release/*.apk
          retention-days: 7